services:
  # 1. API Backend (FastAPI)
  - type: web
    name: sistema-articulo-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12

  # 2. Frontend (Streamlit)
  - type: web
    name: sistema-articulo-frontend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: BACKEND_URL
        fromService:
          type: web
          name: sistema-articulo-backend
          property: host
